<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shooting Game</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #000;
        overflow: hidden;
      }
      canvas {
        display: block;
        width: 100vw;
        height: 100vh;
      }
      #crosshair {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 20px;
        height: 20px;
        pointer-events: none;
      }
      #crosshair::before,
      #crosshair::after {
        content: '';
        position: absolute;
        background: white;
      }
      #crosshair::before {
        width: 2px;
        height: 100%;
        left: 50%;
        transform: translateX(-50%);
      }
      #crosshair::after {
        width: 100%;
        height: 2px;
        top: 50%;
        transform: translateY(-50%);
      }
      #hud {
        position: fixed;
        bottom: 30px;
        left: 30px;
        color: white;
        font-family: Arial, sans-serif;
        font-size: 20px;
        text-shadow: 1px 1px 3px black;
      }
      #blocker {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: rgba(0,0,0,0.7);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: white;
        font-family: Arial, sans-serif;
        z-index: 999;
      }
      #blocker h1 {
        font-size: 48px;
        margin-bottom: 10px;
      }
      #blocker p {
        font-size: 20px;
        color: #aaa;
      }
    </style>
  </head>
  <body>
    <div id="blocker">
      <h1>SHOOTING GAME</h1>
      <p>Click to Play</p>
    </div>
    <div id="crosshair"></div>
    <div id="hud">
      ❤️ <span id="health">100</span> &nbsp;&nbsp;
      🔫 <span id="ammo">30</span>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
